  <section>
    <h2>Map - Domains</h2>
    <script>
      let domains = ["ibm", "microsoft", "apple", "amazon"];
      let d1 = domains.map(domain => `${domain}.com`);
      let d2 = domains.map(domain => domain = `${domain}.com`);
      const d3 = domains.map(x => x + ".com");
      console.log(d1);
      console.log(d2);
      console.log(d3);
    </script>
    Check the console.
  </section>
  <section>
    <h2>Filter - countries</h2>
    <script>
      let countries = ["Sadia Arabia", "Sudan", "India", "Australia", "Mexico"];
      let longCountryNames = countries.filter(country => country.length > 9);
      console.log(longCountryNames);
    </script>
    Check the console.
  </section>
  <section>
    <h2>Switch - Operators.</h2>
    <label for="operator">Select your the arithmetic operation: </label>
    <select id="operator">
      <option value="+">Addition ➕</option>
      <option value="-">Subtraction ➖</option>
      <option value="*">Multiply ❌</option>
      <option value="/">Divide ➗</option>
    </select>
    <script>
      const operator = document.querySelector('#operator');
      operator.addEventListener('change', function () {
        let a = 4;
        let b = 15;
        let op = operator.value;
        let answer = -1;
        switch (op) {
          case "+":
            answer = a + b;
            break;
          case "-":
            answer = a - b;
            break;
          case "*":
            answer = a * b;
            break;
          case "/":
            answer = a / b;
            break;
        }
        console.log(answer);
      });
    </script>
    Check the console.
  </section>
