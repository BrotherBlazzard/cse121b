<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ES Modules Ponder - Courses and sections</title>
  <meta name="description"
    content="Make sure you read through the Prepare section for this topic. You will also need your editor open with some html and JS code. This is the finished code from the Ponder section of the Objects module. Create two files: modules.html and modules.js, then copy paste the code below into them.">
  <link rel="stylesheet" href="styles/style.css">
  <script src="scripts/modules.js" type="module"></script>
</head>

<body>
  <h1>ES Modules Example</h1>
  <header>
    <h2 id="courseName"></h2>
    <h3 id="courseCode"></h3>
  </header>
  <form>
    <h4>Action</h4>
    <label for="sectionNumber">Section Number: </label>
    <input id="sectionNumber" size="2" />
    <button id="enrollStudent">Enroll Student</button>
    <button id="dropStudent">Drop Student</button>
  </form>
  <div class="report">
    <h4>Report</h4>
    <table>
      <thead>
        <tr>
          <th>Section#</th>
          <th>Room#</th>
          <th>#Enrolled</th>
          <th>Days</th>
          <th>Instructor</th>
        </tr>
      </thead>
      <tbody id="sections">


      </tbody>
    </table>
  </div>
  <footer>
    CSE 121b .:|:. Brother Blazzard .:|:. Lab Work
  </footer>
</body>

</html>
